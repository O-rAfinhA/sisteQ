name: Deploy (DigitalOcean Droplet)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

      - name: Deploy via SSH (Swarm)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DO_DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            export SISTEQ_IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_TOKEN }}"
            docker swarm init 2>/dev/null || true
            docker stack deploy -c deploy/stack.yml sisteq --with-registry-auth
