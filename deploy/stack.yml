version: '3.8'

services:
  caddy:
    image: caddy:2.8.4
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    networks:
      - web
      - internal
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SISTEQ_DOMAIN: ${SISTEQ_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    deploy:
      placement:
        constraints:
          - node.role == manager

  app:
    image: ${SISTEQ_IMAGE}
    networks:
      - internal
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: '1'
      SISTEQ_PROFILE_STORE: pg
      DATABASE_URL: ${DATABASE_URL}
      SISTEQ_SESSION_SECRET: ${SISTEQ_SESSION_SECRET}
      SISTEQ_JWT_SECRET: ${SISTEQ_JWT_SECRET}
      SISTEQ_SUPER_ADMIN_TOKEN: ${SISTEQ_SUPER_ADMIN_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      SISTEQ_GOOGLE_CLIENT_ID: ${SISTEQ_GOOGLE_CLIENT_ID}
      SISTEQ_GOOGLE_CLIENT_SECRET: ${SISTEQ_GOOGLE_CLIENT_SECRET}
      SISTEQ_GOOGLE_REDIRECT_URI: ${SISTEQ_GOOGLE_REDIRECT_URI}
      SISTEQ_DB_LOGS: ${SISTEQ_DB_LOGS}
      PGPOOL_MAX: ${PGPOOL_MAX}
      PGPOOL_IDLE_MS: ${PGPOOL_IDLE_MS}
      PGPOOL_CONN_TIMEOUT_MS: ${PGPOOL_CONN_TIMEOUT_MS}
      PG_TX_RETRIES: ${PG_TX_RETRIES}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1024M

  postgres:
    image: postgres:16.4-alpine
    networks:
      - internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      placement:
        constraints:
          - node.role == manager

  pg_backup:
    image: prodrigestivill/postgres-backup-local:16
    networks:
      - internal
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "--schema=public --blobs"
      SCHEDULE: ${PG_BACKUP_SCHEDULE}
      BACKUP_KEEP_DAYS: ${PG_BACKUP_KEEP_DAYS}
      BACKUP_KEEP_WEEKS: ${PG_BACKUP_KEEP_WEEKS}
      BACKUP_KEEP_MONTHS: ${PG_BACKUP_KEEP_MONTHS}
    volumes:
      - pg_backups:/backups
    deploy:
      placement:
        constraints:
          - node.role == manager

  loki:
    image: grafana/loki:3.2.0
    networks:
      - internal
    configs:
      - source: loki_config
        target: /etc/loki/config.yml
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - loki_data:/loki
    deploy:
      placement:
        constraints:
          - node.role == manager

  promtail:
    image: grafana/promtail:3.2.0
    networks:
      - internal
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yml
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: global

  grafana:
    image: grafana/grafana-oss:11.2.0
    networks:
      - internal
      - web
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
    deploy:
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus:v2.55.0
    networks:
      - internal
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - prometheus_data:/prometheus
    deploy:
      placement:
        constraints:
          - node.role == manager

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    networks:
      - internal
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      mode: global

networks:
  web:
    driver: overlay
    attachable: true
  internal:
    driver: overlay
    attachable: true

volumes:
  pg_data:
  pg_backups:
  caddy_data:
  caddy_config:
  loki_data:
  grafana_data:
  prometheus_data:

configs:
  caddyfile:
    file: ./deploy/Caddyfile
  loki_config:
    file: ./deploy/loki-config.yml
  promtail_config:
    file: ./deploy/promtail-config.yml
  grafana_datasource:
    file: ./deploy/grafana-datasource.yml
  prometheus_config:
    file: ./deploy/prometheus.yml
